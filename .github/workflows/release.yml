name: Release
# Publishing is triggered by pushing a semantic-version tag (e.g. 7.0.0). The
# tag name is the release version, passed to Gradle via NEW_TAG.

on:
  push:
    tags:
      - "*.*.*"

jobs:
  release:
    name: Publish
    runs-on: ubuntu-latest
    environment: PROD
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3
        with:
          fetch-depth: 0

      - name: Set up Java
        id: setup-jre
        uses: actions/setup-java@b6e674f4b717d7b0ae3baee0fbe79f498905dfde # v1
        with:
          java-version: "11"
          architecture: x64

      - name: Publish to Sonatype Central
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
          MAVEN_SIGNATURE_SECRET_KEY: ${{ secrets.MAVEN_SIGNATURE_SECRET_KEY }}
          MAVEN_SIGNATURE_PASSWORD: ${{ secrets.MAVEN_SIGNATURE_PASSWORD }}
          NEW_TAG: ${{ github.ref_name }}
        run: |
          ./gradlew clean sonatypeCentralUpload -Pversion="${NEW_TAG}" -x test
