name: Release
# Publishing is triggered by pushing a semantic-version tag (e.g. 7.0.0). The
# tag name is the release version, passed to Gradle via NEW_TAG.

on:
  push:
    tags:
      - "*.*.*"

jobs:
  release:
    name: Publish
    runs-on: ubuntu-latest
    environment: PROD
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3
        with:
          fetch-depth: 0

      - name: Set up Java
        id: setup-jre
        uses: actions/setup-java@b6e674f4b717d7b0ae3baee0fbe79f498905dfde # v1
        with:
          java-version: "11"
          architecture: x64

      # GH Packages publish uses the native GITHUB_TOKEN (packages: write).
      - name: Publish to GH Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_TAG: ${{ github.ref_name }}
        run: |
          ./.publish/prepare.sh
          ./gradlew compileJava publish -Pversion="${NEW_TAG}"
